version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 0
    cooldown:
      default-days: 7
      include:
        - "*"
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      npm-minor-and-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      npm-dev-minor-and-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "npm"
